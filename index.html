<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Dimensions</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="ui-layer">
<header>
<h1>Minecraft Web</h1>
<nav id="dimension-nav">
<button data-dim="overworld" class="active">Overworld</button>
<button data-dim="nether">The Nether</button>
<button data-dim="end">The End</button>
</nav>
</header>
<div class="content-grid">
<div class="card" id="mob-card">
<h2 id="mob-title">The Creeper</h2>
<p id="mob-desc">Watch out in the center of the screen! The Creeper can blow any player up to smithereens if the player is not attentive of his surroundings. These
green ninjas can sabotage you anywhere in the mines by exploding!
</p>
</div>
</div>
<footer>
</footer>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
